# rigtop example configuration
# Copy to rigtop.toml and adjust for your setup.

[general]
interval = 2.0        # poll interval in seconds
once = false           # set true to read once and exit
meters = true          # show rig meter values (ALC, SWR, power, etc.)
log_level = "WARNING" # DEBUG, INFO, WARNING, ERROR (also controls rigctld -v)

# --- Rig (rigctld) — always used for GPS, frequency, mode, meters ---
# Use [rig] for a single radio, or [[rig]] entries for multiple (select with :rig <name>).
#
# Capability hints let the TUI adapt to your radio without source code changes:
#   att_steps     — ATT dB steps your radio supports (default [0,6,12,18])
#   att_settable  — false if hamlib can't set ATT on your radio (IC-705: false)
#   modes         — modes shown in the dropdown (omit unsupported ones)
#   has_data_modes — false to hide the Data button (for radios without PKT modes)

# IC-705 — ATT read-only via hamlib
[rig]
name = "IC-705"
host = "127.0.0.1"
port = 4532
att_settable  = false
att_steps     = [0, 6, 12, 18]

# --- Additional rig examples (uncomment and rename [rig] → [[rig]] to use multiple) ---

# IC-7300 — ATT settable, same steps
# [[rig]]
# name         = "IC-7300"
# host         = "127.0.0.1"
# port         = 4533
# att_settable = true
# att_steps    = [0, 6, 12, 18]

# IC-9700 (VHF/UHF — similar caps to IC-705)
# [[rig]]
# name         = "IC-9700"
# port         = 4534
# att_settable = false
# att_steps    = [0, 3, 6, 9, 12, 15, 18]

# FT-991A — no Icom packet modes, different ATT steps
# [[rig]]
# name           = "FT-991A"
# port           = 4535
# att_settable   = true
# att_steps      = [0, 6, 12]
# has_data_modes = false
# modes          = ["FM", "USB", "LSB", "AM", "CW", "CWR", "RTTY", "RTTYR", "PKTFM", "PKTUSB"]

# --- rigctld launcher (auto-start rigctld) ---
# Remove this section or use --no-rigctld to skip auto-launch.
[rigctld]
model = 3085           # Hamlib rig model (3085 = IC-705)
serial_port = "COM9"  # serial port (COM9, /dev/ttyUSB0, etc.)
baud_rate = 19200      # serial baud rate (1200..115200)
data_bits = 8          # data bits (5..8)
stop_bits = 1          # stop bits (1 or 2)
serial_parity = "None" # parity: None, Odd, Even, Mark, Space
serial_handshake = "None" # handshake: None, XONXOFF, Hardware
dtr_state = "Unset"    # DTR state: Unset, ON, OFF
rts_state = "Unset"    # RTS state: Unset, ON, OFF
ptt_type = "RIG"       # PTT type: RIG, RIGMICDATA, DTR, RTS, Parallel, CM108, GPIO, GPION, None
ptt_pathname = ""      # PTT device path (e.g. COM10, /dev/ttyUSB1) — blank = same as rig
ptt_share = false      # true to share PTT port with other apps

# --- GPS Fallback (optional) ---
# If the rig has no GPS fix, fall back to iOS GPS2IP app.
# Remove this section or use --no-gps to disable.
[gps_fallback]
enabled = true
host = "192.168.1.100" # GPS2IP app host address
port = 11123            # GPS2IP TCP port

# --- Static GPS Position (optional) ---
# Hard-coded position used when neither rig GPS nor fallback have a fix.
# Useful for fixed/home stations. Remove this section to disable.
# [gps_static]
# enabled = true
# lat = 59.329           # latitude (decimal degrees)
# lon = 18.069           # longitude (decimal degrees)
# alt = 28.0             # altitude in metres (optional)

# --- APRS ---
# QSY rig to APRS frequency when :aprs on is used.
# Remove this section if you don't use APRS.
# [aprs]
# enabled = false       # QSY only happens on :aprs on
# freq = 144.800        # MHz (EU: 144.800, NA: 144.390)
# qsy_mode = "FM"

# --- TX Watchdog ---
# Force PTT off if the radio transmits continuously for too long.
# Protects against stuck TX (e.g. VOX loop, stuck PTT button).
# Remove this section to disable the watchdog.
[watchdog]
tx_timeout = 120       # seconds (minimum 10)

# --- Direwolf KISS TCP + optional launcher ---
# Receive local RF APRS decodes from Direwolf.
# Decoded packets appear in the APRS pane in yellow.
# Set install_path to let rigtop start/stop Direwolf on demand.
# Config file is chosen automatically: direwolf-aprs.conf / direwolf-bbs.conf.
# Remove this section if you don't run Direwolf.
# [direwolf]
# host = "127.0.0.1"
# port = 8001           # Direwolf KISS TCP port
# install_path = "c:\\direwolf"  # set to enable launcher

# --- Packet BBS ---
# Quick QSY to packet BBS frequency via :bbs on / :bbs off in the TUI.
# Saves and restores previous freq/mode automatically.
# [bbs]
# enabled = false       # QSY currently only happens on :bbs on
# freq = 144.675        # packet frequency in MHz (SM: 144.675, EU common: 144.625)
# mode = "PKTFM"        # rig mode (PKTFM = 1200 baud FM, PKTUSB = 9600 baud USB)

# --- Sinks ---
# Use [[sink]] (double brackets) for each sink. Multiple sinks run simultaneously.
# Default sink is TUI if none specified.
# Set enabled = false to disable a sink without removing it.

[[sink]]
type = "tui"           # full-screen dashboard (default)

# [[sink]]
# type = "console"     # plain text output
# nmea = false         # set true to include NMEA sentences

# [[sink]]
# type = "wsjtx"       # send grid locator to WSJT-X via UDP
# # port = 2237        # default

# [[sink]]
# type = "nmea"        # NMEA GPS sentences for Direwolf, PinPoint, etc.
# # TCP mode (Linux):  Direwolf conf: GPSNMEA host=localhost:10110
# # port = 10110       # default
# # Serial mode (Windows): set device to a virtual COM port
# # device = "COM10"   # rigtop writes here, consumer reads the other end

# [[sink]]
# type = "gpsd"         # gpsd-compatible JSON GPS server
# # port = 2947         # default
# # Works with: gpspipe, cgps, Xastir, YAAC, any libgps client

# [[sink]]
# type = "aprsis"       # beacon live GPS to APRS-IS (aprs.fi etc.)
# callsign = "N0CALL-1" # your callsign-SSID
# server = "euro.aprs2.net"  # APRS-IS Tier 2 server
# passcode = "12345"   # APRS-IS passcode for your callsign
# interval = 120         # beacon interval in seconds (min 30)
# comment = "rigtop"    # APRS comment text
# aprs_filter = "r/59.2/18.1/200"  # server filter (blank = auto from GPS position)
# # Filter examples:  r/lat/lon/range(km)  b/CALL1/CALL2  t/poimqstunw

# [[sink]]
# type = "civ_proxy"    # ICOM CI-V proxy — lets HRD/other CAT talk via rigctld
# device = "COM14"      # virtual serial port (rigtop writes here)
# baudrate = 19200      # baud rate to match HRD's setting
# rig_addr = 0          # CI-V address (0 = auto from rig_name: IC-705→0xA4)
# rig_name = "IC-705"   # rig model for auto CI-V address lookup
# # HRD connects to the other end of the virtual pair (e.g. COM15).
# # Use VSPD or com0com to create the pair (COM14↔COM15).
