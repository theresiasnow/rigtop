# nmead example configuration
# Copy to nmead.toml and adjust for your setup.

[general]
interval = 2.0    # poll interval in seconds
# once = true     # uncomment to read once and exit
# meters = true   # uncomment to show rig meter values (ALC, SWR, power, etc.)

# --- Rig (rigctld) — always used for GPS, frequency, mode, meters ---
[rig]
host = "127.0.0.1"
port = 4532

# --- GPS Fallback (optional) ---
# If the rig has no GPS fix, fall back to iOS GPS2IP app.
# Uncomment to enable:
# [gps_fallback]
# host = "192.168.1.100"
# port = 11123

# --- Position Sinks ---
# Use [[sink]] (double brackets) for each sink. Multiple sinks can run simultaneously.

[[sink]]
type = "console"
nmea = false       # set to true to include NMEA GGA/RMC sentences

# Live terminal dashboard (alternative to console):
# [[sink]]
# type = "tui"

# Uncomment to also send grid locator to WSJT-X:
# [[sink]]
# type = "wsjtx"
# host = "127.0.0.1"
# port = 2237
