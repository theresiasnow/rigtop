name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    permissions:
      contents: write   # create GitHub release
      id-token: write   # OIDC for PyPI trusted publishing (future use)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for release notes

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG="${{ github.ref_name }}"
          PKG_VERSION="v$(uv run python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")"
          echo "Tag: $TAG  Package: $PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package version $PKG_VERSION"
            exit 1
          fi

      - name: Build sdist + wheel
        run: uv build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          make_latest: true
