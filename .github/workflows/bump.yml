name: Bump version

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      increment:
        description: "Override increment (leave blank = auto from commits)"
        required: false
        type: choice
        options: ["", "patch", "minor", "major"]
        default: ""

jobs:
  bump:
    name: cz bump → build → release
    runs-on: ubuntu-latest
    # Skip the bump commit itself to avoid an infinite loop.
    # commitizen always prefixes bump commits with "bump:".
    if: "!startsWith(github.event.head_commit.message, 'bump:')"

    permissions:
      contents: write   # push tag + create GitHub release
      id-token: write   # OIDC for PyPI trusted publishing (future use)

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          if [ -n "${{ inputs.increment }}" ]; then
            uv run cz bump --increment ${{ inputs.increment }} --yes
          else
            uv run cz bump --yes || code=$?
            # Exit 21 = NO_COMMITS_TO_BUMP (e.g. ci:/docs:/chore: commits).
            # Treat as a no-op — not an error.
            if [ "${code:-0}" -eq 21 ]; then
              echo "No eligible commits to bump — skipping release"
              echo "tag=" >> "$GITHUB_OUTPUT"
              exit 0
            elif [ -n "${code}" ]; then
              exit $code
            fi
          fi
          NEW_TAG=$(git describe --tags --abbrev=0)
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Push commit and tag
        if: steps.bump.outputs.tag != ''
        run: git push --follow-tags

      - name: Build sdist + wheel
        if: steps.bump.outputs.tag != ''
        run: uv build

      - name: Create GitHub Release
        if: steps.bump.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          files: dist/*
          generate_release_notes: true
          make_latest: true
