version: 2

updates:
  # GitHub Actions — keep action versions current
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "chore(actions)"

  # Python dependencies via pip ecosystem
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    groups:
      python-deps:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"
    # Only update runtime deps; dev deps (ruff) handled separately
    allow:
      - dependency-type: direct
