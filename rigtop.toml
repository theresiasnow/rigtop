[general]
interval = 2.0
once = false
meters = true
log_level = "DEBUG"

[rig]
name = "default"
host = "127.0.0.1"
port = 4532

[rigctld]
model = 3085
serial_port = "COM9"
baud_rate = 19200
data_bits = 8
stop_bits = 1
serial_parity = "None"
serial_handshake = "None"
dtr_state = "Unset"
rts_state = "Unset"
ptt_type = "RIG"
ptt_pathname = ""
ptt_share = false

[gps_fallback]
host = "192.168.50.162"
port = 11123

[aprs]
qsy_freq = 144.800     # APRS frequency in MHz (EU: 144.800, NA: 144.390)
qsy_mode = "FM"

[[sink]]
type = "tui"
enabled = true

[[sink]]
type = "wsjtx"
enabled = true
host = "127.0.0.1"
port = 2237

[[sink]]
type = "nmea"
enabled = true
device = "COM10"       # rigtop writes here (VSPD pair COM10↔COM11)

[[sink]]
type = "nmea"
enabled = true
device = "COM12"       # rigtop writes here (VSPD pair COM12↔COM13)

[[sink]]
type = "gpsd"
enabled = true

[[sink]]
type = "aprsis"
enabled = true
callsign = "SA0TSS-1"
server = "euro.aprs2.net"
port = 14580
passcode = "17316"
interval = 120
comment = "rigtop"
aprs_filter = "r/59.2/18.1/200"  # receive APRS within 200km of Stockholm
